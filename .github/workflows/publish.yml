name: publish

on:
  push:
    tags: ['v*']

jobs:
  publish-jsr:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x
      - run: deno task test
      - run: npx jsr publish

  # npm publish deferred until @ensj scope is set up and NPM_TOKEN is provisioned.
