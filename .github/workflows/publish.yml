name: publish

on:
  push:
    tags: ['v*']

jobs:
  publish-jsr:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x
      - run: deno task test
      - run: npx jsr publish

  publish-npm:
    runs-on: ubuntu-latest
    needs: publish-jsr
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      - name: Build npm package
        run: deno task build:npm "${GITHUB_REF#refs/tags/v}"
      - name: Publish to npm
        run: cd npm && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
